spring:
  # 生产环境 MySQL
  datasource:
    url: jdbc:mysql://localhost:3306/knowledge_base?useUnicode=true&characterEncoding=utf8&useSSL=true&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10

  # 生产环境 MongoDB
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/knowledge_base}

    # 生产环境 Redis
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  # Spring AI - 生产环境使用环境变量
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
    zhipuai:
      api-key: ${ZHIPU_API_KEY}
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}

# 生产环境关闭 SQL 日志
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

logging:
  level:
    com.knowledge: info
